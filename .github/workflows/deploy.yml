name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create deployment package
        run: tar -czf frontend.tar.gz dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Upload to S3
        run: aws s3 cp frontend.tar.gz s3://alashed-media/deploy/frontend.tar.gz

      - name: Deploy to EC2
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-08eb56616ddb569bc" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["cd /home/ubuntu && rm -rf public && mkdir -p public && aws s3 cp s3://alashed-media/deploy/frontend.tar.gz . && tar -xzf frontend.tar.gz && mv dist/* public/ && rm -rf dist frontend.tar.gz && echo Deploy done"]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"
          sleep 30

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-08eb56616ddb569bc" \
            --query "[Status,StandardOutputContent]" \
            --output text
